services:
    - type: web
    name: whatsapp-bot
    env: node
    plan: free
    buildCommand: npm install
    startCommand: node index.js
    envVars:
            - key: PUPPETEER_SKIP_CHROMIUM_DOWNLOAD
        value: "true"
            - key: PUPPETEER_EXECUTABLE_PATH
        value: "/usr/bin/google-chrome-stable"
            - key: NODE_ENV
        value: production
            - key: PORT
        value: "3000"
